# Blueprint de Render para GymFlow (12 microservicios + 1 base Postgres).
#
# Que hace este archivo: Render lo lee UNA vez cuando conectas el repo ("New +" -> "Blueprint")
# y crea automaticamente los 13 recursos de abajo (12 "web services" + 1 base de datos).
#
# IMPORTANTE - por que NO se usa fromService para conectar los servicios entre si:
# El plan free de Render permite que un servicio ENVIE trafico por la red privada, pero no que
# lo RECIBA (ver docs/documentacion-tecnica.md). Como los 12 servicios son free, cualquier
# variable armada con fromService (host/port privados) apunta a una direccion que el otro
# servicio no puede aceptar -> UnknownHostException. La solucion es que cada servicio se
# comunique con los demas por su URL PUBLICA (https://<servicio>.onrender.com), que si funciona
# en ambas direcciones en el plan free.
#
# El problema: Render solo conoce la URL publica de un servicio DESPUES de crearlo (el
# subdominio lleva un sufijo aleatorio que no se puede predecir en este archivo). Por eso estas
# 3 variables se configuran UNA VEZ A MANO en el dashboard (Environment de cada servicio),
# despues del primer deploy exitoso:
#   - EUREKA_SERVER_URL   -> en los 11 servicios de dominio (todos menos eureka-server), ej:
#                            https://eureka-server-xxxx.onrender.com/eureka/
#   - BRANCH_SERVICE_URL  -> solo en user-service, ej: https://branch-service-xxxx.onrender.com
#   - MEMBERSHIP_SERVICE_URL -> solo en class-service, ej: https://membership-service-xxxx.onrender.com
#
# fromDatabase si funciona sin problema (no es red privada entre servicios, es la conexion
# directa a Postgres, que Render expone igual en el plan free).
#
# Los 4 servicios con datos "de negocio" reales (usuarios, sucursales, membresias, accesos)
# usan la base Postgres compartida, cada uno en su propio schema (ver documentacion-tecnica.md).
# Los otros 8 servicios siguen usando H2 en memoria (datos operativos/efimeros).

databases:
  - name: gymflow-postgres
    databaseName: gymflow
    user: gymflow_user
    plan: free
    # OJO: el plan free de Postgres en Render expira despues de un tiempo fijo desde su creacion.
    # Revisa la fecha de expiracion en el dashboard apenas la crees y agenda la defensa antes de esa fecha.

services:
  # -------------------------------------------------------------------------
  # Infraestructura
  # -------------------------------------------------------------------------
  - type: web
    name: eureka-server
    runtime: docker
    dockerfilePath: ./eureka-server/Dockerfile
    dockerContext: ./eureka-server
    plan: free
    envVars:
      - key: PORT
        value: 8761

  - type: web
    name: gateway-service
    runtime: docker
    dockerfilePath: ./gateway-service/Dockerfile
    dockerContext: ./gateway-service
    plan: free
    envVars:
      - key: PORT
        value: 8082
      - key: SPRING_PROFILES_ACTIVE
        value: render
      # EUREKA_SERVER_URL: agregar a mano en el dashboard (ver nota arriba)

  # -------------------------------------------------------------------------
  # Servicios con Postgres real (user, branch, membership, access)
  # -------------------------------------------------------------------------
  - type: web
    name: user-service
    runtime: docker
    dockerfilePath: ./user-service/Dockerfile
    dockerContext: ./user-service
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: render
      # EUREKA_SERVER_URL, BRANCH_SERVICE_URL: agregar a mano en el dashboard (ver nota arriba)
      - key: DB_HOST
        fromDatabase: { name: gymflow-postgres, property: host }
      - key: DB_PORT
        fromDatabase: { name: gymflow-postgres, property: port }
      - key: DB_NAME
        fromDatabase: { name: gymflow-postgres, property: database }
      - key: DB_USER
        fromDatabase: { name: gymflow-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: gymflow-postgres, property: password }

  - type: web
    name: branch-service
    runtime: docker
    dockerfilePath: ./branch-service/Dockerfile
    dockerContext: ./branch-service
    plan: free
    envVars:
      - key: PORT
        value: 8081
      - key: SPRING_PROFILES_ACTIVE
        value: render
      # EUREKA_SERVER_URL: agregar a mano en el dashboard (ver nota arriba)
      - key: DB_HOST
        fromDatabase: { name: gymflow-postgres, property: host }
      - key: DB_PORT
        fromDatabase: { name: gymflow-postgres, property: port }
      - key: DB_NAME
        fromDatabase: { name: gymflow-postgres, property: database }
      - key: DB_USER
        fromDatabase: { name: gymflow-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: gymflow-postgres, property: password }

  - type: web
    name: membership-service
    runtime: docker
    dockerfilePath: ./membership-service/Dockerfile
    dockerContext: ./membership-service
    plan: free
    envVars:
      - key: PORT
        value: 8083
      - key: SPRING_PROFILES_ACTIVE
        value: render
      # EUREKA_SERVER_URL: agregar a mano en el dashboard (ver nota arriba)
      - key: DB_HOST
        fromDatabase: { name: gymflow-postgres, property: host }
      - key: DB_PORT
        fromDatabase: { name: gymflow-postgres, property: port }
      - key: DB_NAME
        fromDatabase: { name: gymflow-postgres, property: database }
      - key: DB_USER
        fromDatabase: { name: gymflow-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: gymflow-postgres, property: password }

  - type: web
    name: access-service
    runtime: docker
    dockerfilePath: ./access-service/Dockerfile
    dockerContext: ./access-service
    plan: free
    envVars:
      - key: PORT
        value: 8084
      - key: SPRING_PROFILES_ACTIVE
        value: render
      # EUREKA_SERVER_URL: agregar a mano en el dashboard (ver nota arriba)
      - key: DB_HOST
        fromDatabase: { name: gymflow-postgres, property: host }
      - key: DB_PORT
        fromDatabase: { name: gymflow-postgres, property: port }
      - key: DB_NAME
        fromDatabase: { name: gymflow-postgres, property: database }
      - key: DB_USER
        fromDatabase: { name: gymflow-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: gymflow-postgres, property: password }

  # -------------------------------------------------------------------------
  # Servicios con H2 en memoria (datos operativos, no criticos)
  # -------------------------------------------------------------------------
  - type: web
    name: qr-generator-service
    runtime: docker
    dockerfilePath: ./qr-generator-service/Dockerfile
    dockerContext: ./qr-generator-service
    plan: free
    envVars:
      - key: PORT
        value: 8085
      - key: SPRING_PROFILES_ACTIVE
        value: render
      # EUREKA_SERVER_URL: agregar a mano en el dashboard (ver nota arriba)

  - type: web
