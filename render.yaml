# Blueprint de Render para GymFlow (12 microservicios + 1 base Postgres).
#
# Que hace este archivo: Render lo lee UNA vez cuando conectas el repo ("New +" -> "Blueprint")
# y crea automaticamente los 13 recursos de abajo (12 "web services" + 1 base de datos),
# ya conectados entre si. No hay que crear cada servicio a mano en el dashboard.
#
# Como se conectan los servicios entre si sin hardcodear URLs:
#   fromService: le pide a Render el host/puerto interno (red privada) de OTRO servicio
#                del propio Blueprint en el momento del deploy.
#   fromDatabase: le pide a Render host/puerto/usuario/password de la base Postgres.
# Esos valores se inyectan como variables de entorno (EUREKA_HOST, DB_HOST, etc.), que son
# EXACTAMENTE las que ya usan los application-render.yml de cada servicio.
#
# Los 4 servicios con datos "de negocio" reales (usuarios, sucursales, membresias, accesos)
# usan la base Postgres compartida (cada uno con sus propias tablas). Los otros 8 servicios
# siguen usando H2 en memoria (justificable: datos operativos/efimeros, no criticos si se
# reinician; ver docs/documentacion-tecnica.md para el detalle de esta decision).

databases:
  - name: gymflow-postgres
    databaseName: gymflow
    user: gymflow_user
    plan: free
    # OJO: el plan free de Postgres en Render expira despues de un tiempo fijo desde su creacion.
    # Revisa la fecha de expiracion en el dashboard apenas la crees y agenda la defensa antes de esa fecha.

services:
  # -------------------------------------------------------------------------
  # Infraestructura
  # -------------------------------------------------------------------------
  - type: web
    name: eureka-server
    runtime: docker
    dockerfilePath: ./eureka-server/Dockerfile
    dockerContext: ./eureka-server
    plan: free
    envVars:
      - key: PORT
        value: 8761

  - type: web
    name: gateway-service
    runtime: docker
    dockerfilePath: ./gateway-service/Dockerfile
    dockerContext: ./gateway-service
    plan: free
    envVars:
      - key: PORT
        value: 8082
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: EUREKA_HOST
        fromService:
          name: eureka-server
          type: web
          property: host
      - key: EUREKA_PORT
        fromService:
          name: eureka-server
          type: web
          property: port

  # -------------------------------------------------------------------------
  # Servicios con Postgres real (user, branch, membership, access)
  # -------------------------------------------------------------------------
  - type: web
    name: user-service
    runtime: docker
    dockerfilePath: ./user-service/Dockerfile
    dockerContext: ./user-service
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: EUREKA_HOST
        fromService: { name: eureka-server, type: web, property: host }
      - key: EUREKA_PORT
        fromService: { name: eureka-server, type: web, property: port }
      - key: BRANCH_HOST
        fromService: { name: branch-service, type: web, property: host }
      - key: BRANCH_PORT
        fromService: { name: branch-service, type: web, property: port }
      - key: DB_HOST
        fromDatabase: { name: gymflow-postgres, property: host }
      - key: DB_PORT
        fromDatabase: { name: gymflow-postgres, property: port }
      - key: DB_NAME
        fromDatabase: { name: gymflow-postgres, property: database }
      - key: DB_USER
        fromDatabase: { name: gymflow-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: gymflow-postgres, property: password }

  - type: web
    name: branch-service
    runtime: docker
    dockerfilePath: ./branch-service/Dockerfile
    dockerContext: ./branch-service
    plan: free
    envVars:
      - key: PORT
        value: 8081
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: EUREKA_HOST
        fromService: { name: eureka-server, type: web, property: host }
      - key: EUREKA_PORT
        fromService: { name: eureka-server, type: web, property: port }
      - key: DB_HOST
        fromDatabase: { name: gymflow-postgres, property: host }
      - key: DB_PORT
        fromDatabase: { name: gymflow-postgres, property: port }
      - key: DB_NAME
        fromDatabase: { name: gymflow-postgres, property: database }
      - key: DB_USER
        fromDatabase: { name: gymflow-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: gymflow-postgres, property: password }

  - type: web
    name: membership-service
    runtime: docker
    dockerfilePath: ./membership-service/Dockerfile
    dockerContext: ./membership-service
    plan: free
    envVars:
      - key: PORT
        value: 8083
      - key: SPRING_PROFILES_ACTIVE
