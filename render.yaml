      - key: DB_PORT
        fromDatabase: { name: gymflow-postgres, property: port }
      - key: DB_NAME
        fromDatabase: { name: gymflow-postgres, property: database }
      - key: DB_USER
        fromDatabase: { name: gymflow-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: gymflow-postgres, property: password }

