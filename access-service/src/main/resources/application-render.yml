spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: access_service
  flyway:
    enabled: true
    # Ver nota en user-service/application-render.yml: schema propio por servicio dentro de
    # la misma base compartida "gymflow", para que Flyway no mezcle migraciones V1 de servicios
    # distintos en la misma tabla flyway_schema_history. access-service ya habia desplegado una
    # vez usando el schema "public" por defecto; con este cambio arranca limpio en su propio schema.
    schemas: access_service
    create-schemas: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:${EUREKA_PORT}/eureka/
  instance:
    prefer-ip-address: true
