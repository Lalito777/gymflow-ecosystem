spring:
  application:
    name: equipment-service
  main:
    lazy-initialization: true
  datasource:
    url: jdbc:h2:mem:gymflow_equipment_db
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: 8089

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/