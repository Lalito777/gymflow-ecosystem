# MEMBERSHIP_SERVICE_URL se lee directo desde RestClientConfig.java (@Value), no desde este
# archivo, para evitar ambiguedad entre el default de application.yaml y el override de este perfil.
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
  instance:
    hostname: ${RENDER_EXTERNAL_HOSTNAME}
    prefer-ip-address: false
    non-secure-port-enabled: false
    secure-port-enabled: true
    secure-port: 443
