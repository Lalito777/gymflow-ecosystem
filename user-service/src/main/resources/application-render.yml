# Perfil activo en Render (SPRING_PROFILES_ACTIVE=render).
# Sobrescribe SOLO lo que cambia respecto a application.yaml: BD real (Postgres en vez de H2)
# y las URLs de Eureka/branch-service, que en Render se arman a partir de variables de entorno
# que el Blueprint (render.yaml) inyecta automaticamente vinculando los servicios entre si.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: user_service
  flyway:
    enabled: true
    # Los 4 servicios con Postgres comparten la misma base "gymflow" (limite del plan free de
    # Render: 1 sola base). Sin esto, todos escribirian en la misma tabla flyway_schema_history
    # y Flyway confundiria el V1 de un servicio con el V1 de otro (choque de checksum). Cada
    # servicio es dueno de su propio schema dentro de la base compartida.
    schemas: user_service
    create-schemas: true

services:
  branch:
    url: ${BRANCH_SERVICE_URL}

# EUREKA_SERVER_URL, BRANCH_SERVICE_URL: no se pueden generar automaticamente desde render.yaml
# (Render asigna el subdominio publico -con sufijo aleatorio- recien cuando el servicio ya existe),
# asi que se configuran una sola vez a mano en el dashboard, en Environment, con la URL publica
# real de cada servicio (https://eureka-server-xxxx.onrender.com/eureka/, etc).
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
  instance:
    # El plan free de Render permite ENVIAR trafico por la red privada, pero no RECIBIRLO. Por eso
    # cada instancia se anuncia en Eureka con su URL PUBLICA (https), no con su IP/hostname privado:
    # asi las llamadas entre servicios (Gateway lb://, Feign por nombre) viajan por internet publico,
    # que si funciona en ambas direcciones incluso en el plan free.
    hostname: ${RENDER_EXTERNAL_HOSTNAME}
    prefer-ip-address: false
    non-secure-port-enabled: false
    secure-port-enabled: true
    secure-port: 443
