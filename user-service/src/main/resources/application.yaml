spring:
  application:
    name: user-service
  main:
    lazy-initialization: true
  jmx:
    enabled: false
  datasource:
    url: jdbc:h2:mem:gymflow_user_db
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  cloud:
    openfeign:
      client:
        config:
          branch-service:
            connect-timeout: 5000
            read-timeout: 5000

server:
  port: 8080
  tomcat:
    threads:
      max: 10

logging:
  level:
    root: INFO
    cl.joaedu.userservice: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

java:
  home: ${java.home}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/